syntax = "proto3";

package echo;

service Echo {
  // Unary RPC: native handler will receive the wire-format request bytes,
  // parse with libprotobuf, and respond with wire-format bytes.
  rpc Echo(EchoRequest) returns (EchoResponse) {}
}

message EchoRequest {
  string message = 1;
  int32 repeat = 2;  // server returns the message repeated this many times
}

message EchoResponse {
  string message = 1;
}
